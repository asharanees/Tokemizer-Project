name: Backend Deploy (EC2 via SSM)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "infra/aws/ec2/**"
      - ".github/workflows/backend-deploy-ssm.yml"
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to deploy"
        required: false
        default: "main"

concurrency:
  group: backend-prod-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      EC2_INSTANCE_ID: ${{ secrets.BACKEND_EC2_INSTANCE_ID }}
      TARGET_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger deploy command via SSM
        id: deploy
        run: |
          set -euo pipefail

          cat > ssm-params.json <<JSON
          {
            "commands": [
              "set -euo pipefail",
              "if [ ! -d /opt/tokemizer/app ]; then echo 'ERROR: /opt/tokemizer/app not found. Run bootstrap first.'; exit 1; fi",
              "if [ ! -f /data/tokemizer/env/backend.env ]; then echo 'ERROR: /data/tokemizer/env/backend.env not found.'; exit 1; fi",
              "sudo bash /opt/tokemizer/app/tokemizer/infra/aws/ec2/deploy_backend.sh ${{ env.TARGET_BRANCH }}"
            ]
          }
          JSON

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Tokemizer backend deploy from GitHub Actions (${GITHUB_SHA})" \
            --parameters file://ssm-params.json \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "Started SSM command: $COMMAND_ID"

      - name: Wait for SSM completion
        run: |
          set -euo pipefail
          COMMAND_ID="${{ steps.deploy.outputs.command_id }}"

          for i in {1..60}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query 'Status' \
              --output text)

            echo "Attempt $i: status=$STATUS"

            if [ "$STATUS" = "Success" ]; then
              break
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
                --output json
              exit 1
            fi

            sleep 10
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
            --output json
