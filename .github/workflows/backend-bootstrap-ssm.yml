name: Backend Bootstrap (EC2 via SSM)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to bootstrap"
        required: true
        default: "main"
      ebs_device:
        description: "EBS block device (example: /dev/nvme1n1)"
        required: true
        default: "/dev/nvme1n1"

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      EC2_INSTANCE_ID: ${{ secrets.BACKEND_EC2_INSTANCE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap EC2 host via SSM
        id: bootstrap
        run: |
          set -euo pipefail

          cat > ssm-params.json <<'JSON'
          {
            "commands": [
              "set -euo pipefail",
              "sudo mkdir -p /opt/tokemizer",
              "if [ ! -d /opt/tokemizer/app/.git ]; then sudo git clone https://github.com/nowusman/tokemizer.git /opt/tokemizer/app; fi",
              "sudo REPO_URL=https://github.com/nowusman/tokemizer.git BRANCH=${{ github.event.inputs.branch }} EBS_DEVICE=${{ github.event.inputs.ebs_device }} MOUNT_POINT=/data bash /opt/tokemizer/app/infra/aws/ec2/bootstrap_backend_host.sh"
            ]
          }
          JSON

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Tokemizer backend bootstrap from GitHub Actions" \
            --parameters file://ssm-params.json \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "Started SSM bootstrap command: $COMMAND_ID"

      - name: Wait for bootstrap completion
        run: |
          set -euo pipefail
          COMMAND_ID="${{ steps.bootstrap.outputs.command_id }}"

          for i in {1..120}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query 'Status' \
              --output text)

            echo "Attempt $i: status=$STATUS"

            if [ "$STATUS" = "Success" ]; then
              break
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$EC2_INSTANCE_ID" \
                --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
                --output json
              exit 1
            fi

            sleep 10
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,StdOut:StandardOutputContent,StdErr:StandardErrorContent}' \
            --output json
